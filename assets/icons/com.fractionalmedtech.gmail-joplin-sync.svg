<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <!-- Background -->
  <rect width="64" height="64" rx="14" fill="#1e2330"/>
  <!-- Envelope body -->
  <rect x="6" y="16" width="30" height="22" rx="3" fill="none" stroke="#ffffff" stroke-width="2.5"/>
  <!-- Envelope flap -->
  <polyline points="6,16 21,27 36,16" fill="none" stroke="#ffffff" stroke-width="2.5" stroke-linejoin="round"/>
  <!-- Arrow shaft -->
  <line x1="40" y1="27" x2="56" y2="27" stroke="#1DA462" stroke-width="3" stroke-linecap="round"/>
  <!-- Arrow head -->
  <polyline points="50,21 56,27 50,33" fill="none" stroke="#1DA462" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
  <!-- Joplin notebook icon -->
  <rect x="40" y="38" width="18" height="16" rx="2" fill="#1DA462"/>
  <line x1="44" y1="43" x2="54" y2="43" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="44" y1="47" x2="54" y2="47" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
  <line x1="44" y1="51" x2="50" y2="51" stroke="#ffffff" stroke-width="1.8" stroke-linecap="round"/>
</svg>
